name: Apply SDC Brand

on:
  push:
    paths:
      - '.github/workflows/apply-sdc-brand.yml'

permissions:
  contents: write

jobs:
  rebrand:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply targeted SDC branding
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from urllib.request import urlopen

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          replacements = {
              '<title>CONS 2026 | Next-Gen Construction</title>': '<title>SDC Sedrah Contracting | Next-Gen General Contracting</title>',
              '<meta name="description" content="A bold one-page Gen-Z construction company website for CONS, founded in 2026.">': '<meta name="description" content="SDC Sedrah Contracting — a next-generation general contracting company delivering commercial, infrastructure, industrial and fit-out projects.">\n<link rel="icon" href="sdc-favicon.svg" type="image/svg+xml">',
