name: Apply SDC Brand
on:
  push:
    paths:
      - '.github/workflows/apply-sdc-brand.yml'
permissions:
  contents: write
jobs:
  rebrand:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply emblem-only green logo sizing
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          s=s.replace('.brandLogo{width:220px;height:54px;object-fit:contain;filter:brightness(0) invert(1)}', '.brandLogo{width:72px;height:58px;object-fit:contain}')
          s=s.replace('.brandLogo{width:166px;height:44px}', '.brandLogo{width:58px;height:48px}')
          p.write_text(s,encoding='utf-8')
          assert '<style>' in s and '</style>' in s and '<script>' in s and '</script>' in s
          assert 'sdc-logo.svg' in s
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add index.html
          git commit -m "Use green emblem-only logo" || exit 0
          git push
