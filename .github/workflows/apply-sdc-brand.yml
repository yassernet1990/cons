name: Apply SDC Content
on:
  push:
    paths:
      - '.github/workflows/apply-sdc-brand.yml'
permissions:
  contents: write
jobs:
  content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply approved bilingual company content
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          s = re.sub(r'<title>.*?</title>', '<title>SDC | Saudi General Contracting Company</title>', s, count=1)
          s = re.sub(r'<meta name="description" content=".*?">', '<meta name="description" content="SDC is a Saudi general contracting company established in 2025, delivering commercial, industrial, infrastructure and fit-out projects